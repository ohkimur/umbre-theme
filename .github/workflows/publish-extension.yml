name: Release extension

on:
  workflow_dispatch:
  push:
    branches: [main]
  release:
    types: [published]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-extension-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Create or update GitHub release
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          release-type: node

  package:
    name: Package VSIX release asset
    needs: [release-please]
    if: ${{ always() && (github.event_name == 'workflow_dispatch' || github.event_name == 'release' || needs.release-please.outputs.release_created == 'true') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Marketplace publishing is intentionally disabled for now.
      # - name: Check required marketplace secrets
      #   env:
      #     VSCE_PAT: ${{ secrets.VSCE_PAT }}
      #     OVSX_PAT: ${{ secrets.OVSX_PAT }}
      #   run: |
      #     if [ -z "$VSCE_PAT" ]; then
      #       echo "::error::Missing VSCE_PAT secret for the Visual Studio Marketplace."
      #       exit 1
      #     fi
      #
      #     if [ -z "$OVSX_PAT" ]; then
      #       echo "::error::Missing OVSX_PAT secret for Open VSX / Cursor distribution."
      #       exit 1
      #     fi

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Build extension
        run: bun run build

      - name: Package VSIX
        run: bun run package

      - name: Name VSIX release asset
        id: asset
        run: |
          version="$(bun -e 'console.log(require("./package.json").version)')"
          asset_name="umbre-theme-${version}.vsix"
          cp umbre-theme.vsix "$asset_name"
          echo "name=$asset_name" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Upload VSIX workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: umbre-theme-vsix-${{ steps.asset.outputs.version }}
          path: ${{ steps.asset.outputs.name }}
          if-no-files-found: error

      - name: Upload VSIX to generated GitHub Release
        if: ${{ needs.release-please.outputs.release_created == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: ${{ steps.asset.outputs.name }}

      - name: Upload VSIX to published GitHub Release
        if: ${{ github.event_name == 'release' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: ${{ steps.asset.outputs.name }}

      # Marketplace publishing is intentionally disabled for now.
      # - name: Publish to Visual Studio Marketplace
      #   env:
      #     VSCE_PAT: ${{ secrets.VSCE_PAT }}
      #   run: bun x vsce publish --packagePath umbre-theme.vsix --pat "$VSCE_PAT"
      #
      # - name: Publish to Open VSX for Cursor-compatible editors
      #   env:
      #     OVSX_PAT: ${{ secrets.OVSX_PAT }}
      #   run: bun x ovsx publish umbre-theme.vsix --pat "$OVSX_PAT"
