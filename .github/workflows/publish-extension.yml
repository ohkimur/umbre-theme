name: Publish extension

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: publish-extension-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to VS Marketplace and Open VSX
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check required secrets
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "::error::Missing VSCE_PAT secret for the Visual Studio Marketplace."
            exit 1
          fi

          if [ -z "$OVSX_PAT" ]; then
            echo "::error::Missing OVSX_PAT secret for Open VSX / Cursor distribution."
            exit 1
          fi

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Build extension
        run: bun run build

      - name: Package VSIX
        run: bun run package

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: umbra-color-theme-vsix
          path: umbra-color-theme.vsix
          if-no-files-found: error

      - name: Publish to Visual Studio Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: bun x vsce publish --packagePath umbra-color-theme.vsix --pat "$VSCE_PAT"

      - name: Publish to Open VSX for Cursor-compatible editors
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: bun x ovsx publish umbra-color-theme.vsix --pat "$OVSX_PAT"
